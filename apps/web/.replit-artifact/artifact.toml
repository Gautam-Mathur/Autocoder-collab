kind = "web"
previewPath = "/"
title = "AutoCoder"
version = "1.0.0"
id = "artifacts/autocoder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8080

[services.development]
run = "pnpm --filter @workspace/autocoder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/autocoder", "run", "build" ]
publicDir = "artifacts/autocoder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8080"
BASE_PATH = "/"
